<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INNO HUB AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-brain"></i> INNO HUB AI
            </div>
            
            <button class="new-chat-btn" id="clearBtn">
                <i class="fas fa-plus"></i> Yangi suhbat
            </button>

            <div class="topics-title">Mavzular</div>
            <div class="topics">
                <button class="topic-btn active" data-topic="all"><i class="fas fa-globe"></i> Barchasi</button>
                <button class="topic-btn" data-topic="Robototexnika"><i class="fas fa-robot"></i> Robototexnika</button>
                <button class="topic-btn" data-topic="Web Dasturlash"><i class="fas fa-code"></i> Web Dasturlash</button>
                <button class="topic-btn" data-topic="Mobilografiya"><i class="fas fa-video"></i> Mobilografiya</button>
                <button class="topic-btn" data-topic="3D Modellashtirish"><i class="fas fa-cube"></i> 3D Modellashtirish</button>
            </div>
        </aside>

        <main class="chat-main">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <i class="fas fa-robot welcome-icon"></i>
                    <h1>Qanday yordam bera olaman?</h1>
                    <p>Texnologiya, dasturlash va boshqa sohalarda savollaringizni bering.</p>
                </div>
                <div id="chatMessages"></div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea id="userInput" placeholder="INNO HUB AI ga xabar yuborish..." rows="1"></textarea>
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="footer-text">
                    INNO HUB AI Gemini 1.5 Flash modeli asosida ishlaydi. Xatoliklar bo'lishi mumkin.
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
